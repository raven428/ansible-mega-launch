---
- name: Prepare targets
  hosts: all
  gather_facts: false
  vars:
    binary_dir: "/usr/local/bin"
    binary_name: "gaiad"
    network_name: "launcher"
    source_files: "files"
  tasks:
    - name: Wait for container to be ready
      ansible.builtin.raw: systemctl is-active basic.target
      register: _wait_result
      until: _wait_result.rc == 0
      retries: 33
      delay: 1
      changed_when: false
    - name: Create directory for binary
      ansible.builtin.file:
        path: "{{ dir }}"
        state: directory
        force: true
        recurse: true
        mode: "0755"
      loop:
        - "{{ binary_dir }}"
        - "{{ service_home }}"
      loop_control:
        loop_var: dir
    - name: Download and install gaiad
      ansible.builtin.get_url:
        url: "https://github.com/cosmos/gaia/releases/\
          download/v14.2.0/gaiad-v14.2.0-linux-amd64"
        dest: "{{ binary_dir }}/{{ binary_name }}"
        mode: "0755"
      register: _download_file
      until: _download_file is succeeded
      retries: 5
      delay: 2
    - name: Init validator node
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: "{{ binary_dir }}/{{ binary_name }} --home='{{ service_home }}' init -o
          --chain-id='{{ network_name }}' '{{ network_name }} validator'

          {{ binary_dir }}/{{ binary_name }} --home='{{ service_home }}' tendermint
          unsafe-reset-all"
      changed_when: false
    - name: Download validator configs
      ansible.builtin.get_url:
        url: "https://github.com/raven428/ansible-mega-launch/releases/\
          download/molecule-default/{{ file }}"
        dest: "{{ service_home }}/config/{{ file }}"
        mode: "0644"
        force: true
      register: _download_file
      until: _download_file is succeeded
      retries: 5
      delay: 2
      loop:
        - "config.toml"
        - "genesis.json"
        - "priv_validator_key.json"
      loop_control:
        loop_var: file
    - name: Upload systemd unit
      ansible.builtin.copy:
        src: "{{ source_files }}/gaiad.service"
        dest: "/etc/systemd/system/gaiad.service"
        force: true
        mode: "0644"
